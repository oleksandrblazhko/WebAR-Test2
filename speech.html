<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speech Synthesizer</title>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }
        
        input[type="text"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        
        .control-item {
            display: flex;
            flex-direction: column;
        }
        
        input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }
        
        .value-display {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }
        
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        button:active {
            transform: translateY(0);
        }
        
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .word-list {
            margin-top: 30px;
            border-top: 2px solid #f0f0f0;
            padding-top: 20px;
        }
        
        .word-list h3 {
            color: #333;
            margin-bottom: 15px;
        }
        
        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #f8f9fa;
            border-radius: 8px;
            margin-bottom: 8px;
        }
        
        .word-item span {
            font-size: 16px;
            color: #333;
        }
        
        .word-item button {
            width: auto;
            padding: 8px 15px;
            font-size: 14px;
        }
        
        .delete-btn {
            background: #ff4757 !important;
            margin-left: 10px;
        }
        
        .delete-btn:hover {
            box-shadow: 0 5px 20px rgba(255, 71, 87, 0.4);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔊 Speech Synthesizer</h1>
        
        <div class="input-group">
            <label for="wordInput">Enter a word or text:</label>
            <input type="text" id="wordInput" placeholder="Type something..." />
        </div>
        
        <div class="input-group">
            <label for="voiceSelect">Voice:</label>
            <select id="voiceSelect"></select>
        </div>
        
        <div class="controls">
            <div class="control-item">
                <label for="rate">Speed:</label>
                <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1" />
                <span class="value-display" id="rateValue">1.0</span>
            </div>
            <div class="control-item">
                <label for="pitch">Pitch:</label>
                <input type="range" id="pitch" min="0.5" max="2" value="1" step="0.1" />
                <span class="value-display" id="pitchValue">1.0</span>
            </div>
        </div>
        
        <button id="speakBtn">🔊 Speak</button>
        
        <div class="word-list">
            <h3>Recent Words:</h3>
            <div id="wordListContainer"></div>
        </div>
    </div>

    <script>
        const wordInput = document.getElementById('wordInput');
        const speakBtn = document.getElementById('speakBtn');
        const voiceSelect = document.getElementById('voiceSelect');
        const rateSlider = document.getElementById('rate');
        const pitchSlider = document.getElementById('pitch');
        const rateValue = document.getElementById('rateValue');
        const pitchValue = document.getElementById('pitchValue');
        const wordListContainer = document.getElementById('wordListContainer');

        let voices = [];
        let wordHistory = [];
        let selectedVoiceName = null;
        let userHasSelected = false; // Track if user has manually selected a voice

        // Load available voices
        function loadVoices() {
            const currentSelection = voiceSelect.value;
            voices = speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';
            
            voices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voice.name} (${voice.lang})`;
                voiceSelect.appendChild(option);
            });
            
            // Restore user's selection if they have manually selected before
            if (userHasSelected && selectedVoiceName) {
                const restoredIndex = voices.findIndex(v => v.name === selectedVoiceName);
                if (restoredIndex !== -1) {
                    voiceSelect.value = restoredIndex;
                }
            }
            // Only auto-select Spanish on first load if user hasn't made a selection
            else if (!userHasSelected) {
                const spanishVoiceIndex = voices.findIndex(v => v.lang.startsWith('es'));
                if (spanishVoiceIndex !== -1) {
                    voiceSelect.value = spanishVoiceIndex;
                    selectedVoiceName = voices[spanishVoiceIndex].name;
                }
            }
        }

        // Initialize voices
        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }
        
        // Track manual voice selection
        voiceSelect.addEventListener('change', () => {
            userHasSelected = true;
            selectedVoiceName = voices[voiceSelect.value].name;
        });

        // Update slider values display
        rateSlider.addEventListener('input', () => {
            rateValue.textContent = rateSlider.value;
        });

        pitchSlider.addEventListener('input', () => {
            pitchValue.textContent = pitchSlider.value;
        });

        // Speak function
        function speak(text) {
            if (!text.trim()) return;

            // Cancel any ongoing speech
            speechSynthesis.cancel();

            const utterance = new SpeechSynthesisUtterance(text);
            
            // Set selected voice - get current selection
            const selectedVoiceIndex = voiceSelect.value;
            if (voices[selectedVoiceIndex]) {
                utterance.voice = voices[selectedVoiceIndex];
                selectedVoiceName = voices[selectedVoiceIndex].name;
            }
            
            // Set rate and pitch
            utterance.rate = parseFloat(rateSlider.value);
            utterance.pitch = parseFloat(pitchSlider.value);

            // Add to history
            addToHistory(text);

            speechSynthesis.speak(utterance);
        }

        // Add word to history
        function addToHistory(text) {
            if (!wordHistory.includes(text)) {
                wordHistory.unshift(text);
                if (wordHistory.length > 10) {
                    wordHistory.pop();
                }
                renderWordList();
            }
        }

        // Render word list
        function renderWordList() {
            wordListContainer.innerHTML = '';
            
            wordHistory.forEach((word, index) => {
                const wordItem = document.createElement('div');
                wordItem.className = 'word-item';
                
                const wordText = document.createElement('span');
                wordText.textContent = word;
                
                const buttonGroup = document.createElement('div');
                
                const speakButton = document.createElement('button');
                speakButton.textContent = '🔊';
                speakButton.onclick = () => speak(word);
                
                const deleteButton = document.createElement('button');
                deleteButton.textContent = '✕';
                deleteButton.className = 'delete-btn';
                deleteButton.onclick = () => {
                    wordHistory.splice(index, 1);
                    renderWordList();
                };
                
                buttonGroup.appendChild(speakButton);
                buttonGroup.appendChild(deleteButton);
                wordItem.appendChild(wordText);
                wordItem.appendChild(buttonGroup);
                wordListContainer.appendChild(wordItem);
            });
        }

        // Event listeners
        speakBtn.addEventListener('click', () => {
            speak(wordInput.value);
        });

        wordInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                speak(wordInput.value);
            }
        });
    </script>
</body>
</html>
