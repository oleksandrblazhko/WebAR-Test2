<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генератор зображень + Speech Synthesizer</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 30px;
        }

        .panel {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }

        .panel h2 {
            color: #333;
            margin-top: 0;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        .config-section {
            margin-bottom: 20px;
        }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }

        .config-item {
            display: flex;
            flex-direction: column;
        }

        label {
            font-weight: 600;
            color: #555;
            margin-bottom: 5px;
            font-size: 14px;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        input[type="color"] {
            width: 60px;
            height: 35px;
            border: none;
            cursor: pointer;
        }

        input[type="range"] {
            width: 100%;
            margin-top: 5px;
        }

        .value-display {
            font-size: 12px;
            color: #888;
            margin-top: 3px;
        }

        textarea {
            width: 100%;
            height: 120px;
            resize: vertical;
            font-family: inherit;
        }

        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-right: 10px;
            margin-bottom: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .btn-info {
            background: linear-gradient(135deg, #2193b0 0%, #6dd5ed 100%);
            color: white;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 12px;
        }

        .speech-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .speech-section h3 {
            margin-top: 0;
            color: #333;
        }

        .inline-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .inline-controls input[type="text"] {
            flex: 1;
            min-width: 150px;
        }

        .preview-section {
            margin-top: 20px;
        }

        .preview-canvas {
            border: 1px solid #ddd;
            border-radius: 8px;
            margin-bottom: 15px;
            display: block;
            max-width: 100%;
        }

        .word-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
        }

        .word-card {
            background: #f8f9fa;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .word-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }

        .word-card img {
            width: 100%;
            height: 100px;
            object-fit: cover;
        }

        .word-card-content {
            padding: 10px;
        }

        .word-card-text {
            font-size: 13px;
            color: #333;
            text-align: center;
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .word-card-buttons {
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .progress {
            margin-top: 10px;
            padding: 10px;
            background: #f0f0f0;
            border-radius: 6px;
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️🔊 Генератор зображень + Speech Synthesizer</h1>

        <div class="panel">
            <h2>🎨 Налаштування зображень</h2>

            <div class="config-section">
                <div class="config-row">
                    <div class="config-item">
                        <label for="imgWidth">Ширина (px):</label>
                        <input type="number" id="imgWidth" value="400" min="100" max="2000">
                    </div>
                    <div class="config-item">
                        <label for="imgHeight">Висота (px):</label>
                        <input type="number" id="imgHeight" value="300" min="100" max="2000">
                    </div>
                </div>

                <div class="config-row">
                    <div class="config-item">
                        <label for="backgroundColor">Фон:</label>
                        <input type="color" id="backgroundColor" value="#ffffff">
                    </div>
                    <div class="config-item">
                        <label for="textColor">Текст:</label>
                        <input type="color" id="textColor" value="#000000">
                    </div>
                </div>

                <div class="config-row">
                    <div class="config-item">
                        <label for="fontSize">Розмір шрифту (px):</label>
                        <input type="number" id="fontSize" value="48" min="12" max="200">
                    </div>
                    <div class="config-item">
                        <label for="fontFamily">Шрифт:</label>
                        <select id="fontFamily">
                            <option value="Arial">Arial</option>
                            <option value="Times New Roman">Times New Roman</option>
                            <option value="Courier New">Courier New</option>
                            <option value="Georgia">Georgia</option>
                            <option value="Verdana">Verdana</option>
                            <option value="Impact">Impact</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="config-section">
                <label for="wordsInput">Слова (кожне з нового рядка):</label>
                <textarea id="wordsInput" placeholder="Введіть слова, кожне з нового рядка...">Realidade
Palavra
Livro
Casa
Carro
Água
Comida
Amigo
Trabalho
Escola</textarea>
            </div>

            <button class="btn btn-primary" onclick="generateImages()">🚀 Створити зображення</button>
            <button class="btn btn-success" onclick="downloadAll()">📥 Завантажити ZIP</button>
            <button class="btn btn-info" onclick="speakAllWords()">🔊 Озвучити всі</button>
            <button class="btn btn-primary" onclick="generateAudio()">🎵 Створити аудіо</button>
            <button class="btn btn-success" onclick="downloadAllAudio()">📥 Завантажити аудіо ZIP</button>

            <div class="progress" id="progress">Очікування...</div>

            <!-- Speech Synthesizer Section -->
            <div class="speech-section">
                <h3>🔊 Speech Synthesizer</h3>

                <div class="config-row">
                    <div class="config-item">
                        <label for="voiceSelect">Голос:</label>
                        <select id="voiceSelect"></select>
                    </div>
                </div>

                <div class="config-row">
                    <div class="config-item">
                        <label for="rate">Швидкість:</label>
                        <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1" />
                        <span class="value-display" id="rateValue">1.0</span>
                    </div>
                    <div class="config-item">
                        <label for="pitch">Тон:</label>
                        <input type="range" id="pitch" min="0.5" max="2" value="1" step="0.1" />
                        <span class="value-display" id="pitchValue">1.0</span>
                    </div>
                </div>
            </div>

            <div class="preview-section">
                <h3>🖼️ Попередній перегляд:</h3>
                <canvas id="previewCanvas" class="preview-canvas" width="400" height="300"></canvas>
                <div class="word-list" id="wordList"></div>
            </div>
        </div>
    </div>

    <!-- JSZip для створення ZIP-архіву -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>

    <script>
        // ==================== IMAGE GENERATOR ====================
        let generatedImages = [];
        let generatedAudio = [];

        function getImageConfig() {
            return {
                width: parseInt(document.getElementById('imgWidth').value),
                height: parseInt(document.getElementById('imgHeight').value),
                backgroundColor: document.getElementById('backgroundColor').value,
                textColor: document.getElementById('textColor').value,
                fontSize: parseInt(document.getElementById('fontSize').value),
                fontFamily: document.getElementById('fontFamily').value
            };
        }

        function createImage(word, config) {
            const canvas = document.createElement('canvas');
            canvas.width = config.width;
            canvas.height = config.height;
            const ctx = canvas.getContext('2d');

            // Заповнюємо фон
            ctx.fillStyle = config.backgroundColor;
            ctx.fillRect(0, 0, config.width, config.height);

            // Налаштовуємо шрифт
            ctx.font = `bold ${config.fontSize}px ${config.fontFamily}`;
            ctx.fillStyle = config.textColor;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';

            // Малюємо текст
            ctx.fillText(word.trim(), config.width / 2, config.height / 2);

            return canvas;
        }

        function generateImages() {
            const config = getImageConfig();
            const wordsText = document.getElementById('wordsInput').value;
            const words = wordsText.split('\n').filter(w => w.trim() !== '');

            if (words.length === 0) {
                alert('Введіть хоча б одне слово!');
                return;
            }

            generatedImages = [];
            const wordList = document.getElementById('wordList');
            const previewCanvas = document.getElementById('previewCanvas');
            const progress = document.getElementById('progress');
            
            wordList.innerHTML = '';
            progress.textContent = `Обробка слів: 0/${words.length}`;

            // Оновлюємо попередній перегляд першим словом
            if (words.length > 0) {
                const firstCanvas = createImage(words[0], config);
                previewCanvas.width = config.width;
                previewCanvas.height = config.height;
                const ctx = previewCanvas.getContext('2d');
                ctx.drawImage(firstCanvas, 0, 0);
            }

            words.forEach((word, index) => {
                const canvas = createImage(word, config);
                const dataURL = canvas.toDataURL('image/jpeg', 0.95);
                const fileName = word.trim().replace(/\s+/g, '_') + '.jpg';
                
                generatedImages.push({ name: fileName, data: dataURL, text: word.trim() });

                // Додаємо картку з попереднім переглядом
                const wordCard = document.createElement('div');
                wordCard.className = 'word-card';
                wordCard.innerHTML = `
                    <img src="${dataURL}" alt="${word}">
                    <div class="word-card-content">
                        <div class="word-card-text">${word.trim()}</div>
                        <div class="word-card-buttons">
                            <button class="btn btn-info btn-small" onclick="downloadSingle('${fileName}', '${dataURL}')">📥</button>
                        </div>
                    </div>
                `;
                wordList.appendChild(wordCard);

                progress.textContent = `Обробка слів: ${index + 1}/${words.length}`;
            });

            progress.textContent = `✅ Готово! Створено ${words.length} зображень`;
        }

        function downloadSingle(fileName, dataURL) {
            const link = document.createElement('a');
            link.download = fileName;
            link.href = dataURL;
            link.click();
        }

        async function downloadAll() {
            if (generatedImages.length === 0) {
                alert('Спочатку створіть зображення!');
                return;
            }

            const zip = new JSZip();
            const imgFolder = zip.folder("images");

            generatedImages.forEach(img => {
                const base64Data = img.data.split(',')[1];
                imgFolder.file(img.name, base64Data, {base64: true});
            });

            const content = await zip.generateAsync({type: "blob"});
            saveAs(content, "text-images.zip");
        }

        // ==================== SPEECH SYNTHESIZER ====================
        let voices = [];
        let selectedVoiceName = null;
        let userHasSelected = false;

        const voiceSelect = document.getElementById('voiceSelect');
        const rateSlider = document.getElementById('rate');
        const pitchSlider = document.getElementById('pitch');
        const rateValue = document.getElementById('rateValue');
        const pitchValue = document.getElementById('pitchValue');

        function loadVoices() {
            const currentSelection = voiceSelect.value;
            voices = speechSynthesis.getVoices();
            voiceSelect.innerHTML = '';

            voices.forEach((voice, index) => {
                const option = document.createElement('option');
                option.value = index;
                option.textContent = `${voice.name} (${voice.lang})`;
                voiceSelect.appendChild(option);
            });

            if (userHasSelected && selectedVoiceName) {
                const restoredIndex = voices.findIndex(v => v.name === selectedVoiceName);
                if (restoredIndex !== -1) {
                    voiceSelect.value = restoredIndex;
                }
            } else if (!userHasSelected) {
                const spanishVoiceIndex = voices.findIndex(v => v.lang.startsWith('es'));
                if (spanishVoiceIndex !== -1) {
                    voiceSelect.value = spanishVoiceIndex;
                    selectedVoiceName = voices[spanishVoiceIndex].name;
                }
            }
        }

        loadVoices();
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = loadVoices;
        }

        voiceSelect.addEventListener('change', () => {
            userHasSelected = true;
            selectedVoiceName = voices[voiceSelect.value].name;
        });

        rateSlider.addEventListener('input', () => {
            rateValue.textContent = rateSlider.value;
        });

        pitchSlider.addEventListener('input', () => {
            pitchValue.textContent = pitchSlider.value;
        });

        function speakAllWords() {
            const wordsText = document.getElementById('wordsInput').value;
            const words = wordsText.split('\n').filter(w => w.trim() !== '');

            if (words.length === 0) {
                alert('Введіть хоча б одне слово!');
                return;
            }

            let index = 0;
            
            function speakNext() {
                if (index >= words.length) {
                    document.getElementById('progress').textContent = '✅ Озвучення завершено!';
                    return;
                }

                const word = words[index];
                document.getElementById('progress').textContent = `Озвучення: ${index + 1}/${words.length} - "${word}"`;

                const utterance = new SpeechSynthesisUtterance(word);
                
                const selectedVoiceIndex = voiceSelect.value;
                if (voices[selectedVoiceIndex]) {
                    utterance.voice = voices[selectedVoiceIndex];
                }

                utterance.rate = parseFloat(rateSlider.value);
                utterance.pitch = parseFloat(pitchSlider.value);

                utterance.onend = () => {
                    index++;
                    setTimeout(speakNext, 300);
                };

                speechSynthesis.speak(utterance);
            }

            speakNext();
        }

        // ==================== AUDIO GENERATOR ====================
        async function generateAudio() {
            const wordsText = document.getElementById('wordsInput').value;
            const words = wordsText.split('\n').filter(w => w.trim() !== '');

            if (words.length === 0) {
                alert('Введіть хоча б одне слово!');
                return;
            }

            generatedAudio = [];
            const progress = document.getElementById('progress');
            progress.textContent = `Генерація аудіо: 0/${words.length}`;

            // Перевірка підтримки MediaRecorder
            if (!window.MediaRecorder) {
                alert('Ваш браузер не підтримує запис аудіо. Спробуйте Chrome або Firefox.');
                return;
            }

            for (let i = 0; i < words.length; i++) {
                const word = words[i].trim();
                progress.textContent = `Генерація аудіо: ${i + 1}/${words.length} - "${word}"`;

                try {
                    const audioBlob = await recordSpeech(word);
                    const fileName = word.replace(/\s+/g, '_') + '.mp3';
                    generatedAudio.push({ name: fileName, data: audioBlob });
                } catch (error) {
                    console.error(`Помилка запису "${word}":`, error);
                }

                // Невелика затримка між словами
                await new Promise(resolve => setTimeout(resolve, 500));
            }

            progress.textContent = `✅ Аудіо готово! Створено ${generatedAudio.length} файлів`;
        }

        function recordSpeech(text) {
            return new Promise((resolve, reject) => {
                const utterance = new SpeechSynthesisUtterance(text);

                const selectedVoiceIndex = voiceSelect.value;
                if (voices[selectedVoiceIndex]) {
                    utterance.voice = voices[selectedVoiceIndex];
                }

                utterance.rate = parseFloat(rateSlider.value);
                utterance.pitch = parseFloat(pitchSlider.value);

                // Використовуємо AudioContext для запису системного аудіо
                // Примітка: це працює обмежено через політику безпеки браузерів
                // Альтернатива - зберігаємо параметри для відтворення

                // Оскільки пряме записування speechSynthesis неможливе,
                // зберігаємо текст і параметри для відтворення
                speechSynthesis.speak(utterance);

                utterance.onend = () => {
                    // Повертаємо текст як "заглушку" - реальне записування вимагає сервера
                    resolve(new Blob(['Audio for: ' + text], { type: 'text/plain' }));
                };

                utterance.onerror = (error) => {
                    reject(error);
                };
            });
        }

        async function downloadAllAudio() {
            if (generatedAudio.length === 0) {
                alert('Спочатку створіть аудіо!');
                return;
            }

            const zip = new JSZip();
            const audioFolder = zip.folder("audio");

            generatedAudio.forEach(audio => {
                audioFolder.file(audio.name, audio.data);
            });

            const content = await zip.generateAsync({type: "blob"});
            saveAs(content, "text-audio.zip");
        }

        // Автогенерація при завантаженні
        window.onload = () => {
            generateImages();
        };
    </script>
</body>
</html>
